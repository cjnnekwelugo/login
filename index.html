<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
<!--EXTERNAL CSS,FONT AWESOME CDN AND GOOGLE FONT LINKS-->
    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!--login-logo-->
    <div class="login-logo">
        <span>Cj</span>
        <span>Cjesco</span>
    </div>
   <!--login heading and sub heading-->
    <h1 class="login-heading">Welcome Back</h1>
    <p class="login-subheading">Sign in to continue to your account.</p>
    <!--form sections-->
    <form>
      <div class="form-group">
        <div>
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com " required>
      </div>  
      <div>
        <label for="password">Password</label>
        <input type="password" name="" id="password"  placeholder="......" required>
      </div>
    <div class="button">
        <button type="submit">Submit</button>
    </div>
      </div>

      <div class="remember">
        <label>
        <input type="checkbox"  id="Remember me">
        Remember me</label>
        <a href="#">Forgot Password</a>
      </div>

      <button type="submit" class="btn-login">Sign in</button>

    </form>

    <div class="footer">
        <p class="login-footer">
        Don't have an account? <a href="#">Create one</a>
      </p>
    </div>

</body>
</html>
